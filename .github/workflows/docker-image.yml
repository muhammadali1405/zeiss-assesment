name: Docker Image Build and Push

on:
  push:
    branches: [ "main" ]
    
permissions:
  id-token: write
  contents: read
  
jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az acr login --name acrzeissassesment003
      - run: |
          docker build -t acrzeissassesment003.azurecr.io/zeiss-api:${{ github.run_number }} .
          docker push acrzeissassesment003.azurecr.io/zeiss-api:${{ github.run_number }}
